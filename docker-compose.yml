version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-deals:latest
    container_name: domain-deals
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/deals"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Nginx reverse proxy for production
